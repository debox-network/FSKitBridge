  Source (persistent URL):
    https://github.com/debox-network/FSKitBridge/blob/main/FSKitExt/protocol.proto

  Purpose:
    Language-neutral wire format between FSKitExt (Swift/ExtensionKit) and the
    backend (e.g., Rust via fskit-fs). This protocol carries file system
    operations (lookup, attributes, read/write, etc).

  License:
    SPDX-License-Identifier: MIT OR Apache-2.0
