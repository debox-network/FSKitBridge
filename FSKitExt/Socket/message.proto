syntax = "proto3";

message Request {
  uint64 request_id = 1;

  oneof request_data {
    RequestTypeOne type_one = 2;
    RequestTypeTwo type_two = 3;
  }
}

message Response {
  uint64 request_id = 1;

  oneof response_data {
    ResponseTypeOne type_one = 2;
    ResponseTypeTwo type_two = 3;
  }
}

message RequestTypeOne {
  string message = 1;
  int32 count = 2;
}

message RequestTypeTwo {
  string username = 1;
  string password = 2;
}

message ResponseTypeOne {
  string reply = 1;
  bool success = 2;
}

message ResponseTypeTwo {
  string status = 1;
  int32 errorCode = 2;
}
