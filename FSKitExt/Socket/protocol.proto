syntax = "proto3";

package pb;

import "google/protobuf/timestamp.proto";

message Request {
  // Properties implemented by volumes that support providing the values of system limits or options.
  message GetPathConfOperations {}

  // A property that provides the supported capabilities of the volume.
  message GetVolumeCapabilities {}

  // A property that provides up-to-date statistics of the volume.
  message GetVolumeStatistics {}

  // Mounts this volume, using the specified options.
  //
  // FSKit calls this method as a signal that some process is trying to mount this volume.
  // Your file system receives a call to ``activate(options:replyHandler:)`` prior to receiving any mount calls.
  //
  // - Parameters:
  //   - options: Options to apply to the mount. These can include security-scoped file paths.
  //              There are no defined options currently.
  //   - reply: A block or closure to indicate success or failure. If mounting fails,
  //            pass an error as the one parameter to the reply handler. If mounting succeeds, pass `nil`.
  //            For an `async` Swift implementation, there's no reply handler; simply return normally.
  message Mount {
    TaskOptions options = 1;
  }

  // Unmounts this volume.
  //
  // Clear and flush all cached state in your implementation of this method.
  //
  // - Parameters:
  //   - reply: A block or closure to indicate success or failure. If unmounting fails,
  //            pass an error as the one parameter to the reply handler. If unmounting succeeds, pass `nil`.
  //            For an `async` Swift implementation, there's no reply handler; simply return normally.
  message Unmount {}

  // Synchronizes the volume with its underlying resource.
  //
  // After calling this method, FSKit assumes that the volume has sent all pending I/O or metadata to its resource.
  //
  // - Parameters:
  //   - flags: Timing flags, as defined in `mount.h.` These flags let the file system know whether to run
  //     the operation in a blocking or nonblocking fashion.
  //   - reply: A block or closure to indicate success or failure. If synchronization fails, pass an error
  //     as the one parameter to the reply handler. If synchronization succeeds, pass `nil`.
  //     For an `async` Swift implementation, there's no reply handler; simply throw an error or return normally.
  message Synchronize {
    // Behavior flags for use with synchronization calls.
    //
    // These values are based on flags defined in `mount.h`. Since there are system-defined flags that are valid
    // in the kernel but not in FSKit, this type defines its members as options rather than use an enumeration.
    //
    // - Values:
    //   - wait = 1: A flag for synchronized I/O with file-integrity completion.
    //   - noWait = 2: A flag for synchronized I/O that starts I/O but doesn't wait for it.
    //   - dWait = 4: A flag for synchronized I/O with data-integrity completion.
    uint32 flags = 1;
  }

  // Fetches attributes for the given item.
  message GetAttributes {
    uint64 item_id = 1;
  }

  // Sets the given attributes on an item.
  message SetAttributes {
    ItemAttributes attributes = 1;
    uint64 item_id = 2;
  }

  // Looks up an item within a directory.
  message LookupItem {
    bytes name = 1;
    uint64 directory_id = 2;
  }

  // Reclaims an item, releasing any resources allocated for the item.
  //
  // FSKit guarantees that for every ``FSItem`` returned by the volume, a corresponding reclaim operation occurs
  // after the upper layers no longer reference that item.
  //
  // > Note: Block device file systems may assess whether an underlying resource terminates before processing reclaim
  // operations. On unary file systems, for example, the associated volumes unmount when such resources disconnect
  // from the system. The unmount triggers a reclaiming of all items. Some implementations benefit greatly
  // from short-circuiting in such cases. With a terminated resource, all I/O results in an error,
  // making short-circuiting the most efficient response.
  //
  // - Parameters:
  //   - item: The item to reclaim.
  //   - reply: A block or closure to indicate success or failure. If removal fails, pass an error as the one parameter
  //   to the reply handler. If removal succeeds, pass `nil`. For an `async` Swift implementation,
  //   there's no reply handler; simply throw an error or return normally.
  message ReclaimItem {
    uint64 item_id = 1;
  }

  // Reads a symbolic link.
  //
  // - Parameters:
  //   - item: The symbolic link to read from. FSKit guarantees this item is of type ``FSItem/ItemType/symlink``.
  //   - reply: A block or closure to indicate success or failure. If reading succeeds, pass the link's contents
  //     as an ``FSFileName`` and a `nil` error. If reading fails, pass the relevant error as the second parameter;
  //     FSKit ignores any ``FSFileName`` in this case. For an `async` Swift implementation, there's no reply handler;
  //     simply return the ``FSFileName`` or throw an error.
  message ReadSymbolicLink {
    uint64 item_id = 1;
  }

  // Creates a new file or directory item.
  message CreateItem {
    bytes name = 1;
    ItemType type = 2;
    uint64 directory_id = 3;
    ItemAttributes attributes = 4;
  }

  // Creates a new symbolic link.
  //
  // If an item named `name` already exists in the directory indicated by `directory`, complete the request
  // with an error with a domain of <doc://com.apple.documentation/documentation/Foundation/NSPOSIXErrorDomain>
  // and a code of `EEXIST`.
  //
  // - Parameters:
  //   - name: The new item's name.
  //   - directory: The directory in which to create the item.
  //   - newAttributes: Attributes to apply to the new item.
  //   - contents: The contents of the new symbolic link.
  //   - reply: A block or closure to indicate success or failure. If creation succeeds, pass the newly-created
  //     ``FSItem`` and a `nil` error. If creation fails, pass the relevant error as the second parameter;
  //     FSKit ignores any ``FSItem`` in this case. For an `async` Swift implementation, there's no reply handler;
  //     simply return the ``FSItem`` or throw an error.
  message CreateSymbolicLink {
    bytes name = 1;
    uint64 directory_id = 2;
    ItemAttributes new_attributes = 3;
    bytes contents = 4;
  }

  // Removes an existing item from a given directory.
  //
  // Don't actually remove the item object itself in your implementation; instead, only remove the given item name from the given directory.
  // Remove and deallocate the item in ``reclaimItem(_:replyHandler:)``.
  //
  // - Parameters:
  //   - item: The item to remove.
  //   - name: The name of the item to remove.
  //   - directory: The directory from which to remove the item.
  //   - reply: A block or closure to indicate success or failure. If removal fails, pass an error as the one parameter to the reply handler. If removal succeeds, pass `nil`. For an `async` Swift implementation, there's no reply handler; simply throw an error or return normally.
  message RemoveItem {
    uint64 item_id = 1;
    bytes name = 2;
    uint64 directory_id = 3;
  }

  // Renames an item from one path in the file system to another.
  //
  // Implement renaming along the lines of this algorithm:
  //
  // - If `item` is a file:
  //   - If the destination file exists:
  //     - Remove the destination file.
  //   - If the source and destination directories are the same:
  //     - Rewrite the name in the existing directory.
  //   - Else:
  //     - Write the new entry in the destination directory.
  //     - Clear the old directory entry.
  // - If `item` is a directory:
  //   - If the destination directory exists:
  //     - If the destination directory isn't empty:
  //       - Fail the operation with an error of <doc://com.apple.documentation/documentation/Foundation/NSPOSIXErrorDomain> and a code of `ENOTEMPTY`.
  //     - Else:
  //        - Remove the destination directory.
  //     - If the source and destination directories are the same:
  //       - Rewrite the name in the existing directory.
  //     - Else:
  //       - If the destination is a child of the source directory:
  //         - Fail the operation with an error.
  //       - Else:
  //         - Write the new entry in the destination directory.
  //         - Update `"."` and `".."` in the moved directory.
  //         - Clear the old directory entry.
  //
  // - Parameters:
  //   - item: The file system object being renamed.
  //   - sourceDirectory: The directory that currently contains the item to rename.
  //   - sourceName: The name of the item within the source directory.
  //   - destinationName: The new name of the item as it appears in `destinationDirectory`.
  //   - destinationDirectory: The directory to contain the renamed object, which may be the same as `sourceDirectory`.
  //   - overItem: The file system object if the destination exists, as discovered in a prior lookup. If this parameter is non-`nil`, mark `overItem` as deleted, so the file system can free its allocated space on the next call to ``reclaimItem(_:replyHandler:)``. After doing so, ensure the operation finishes without errors.
  //   - reply: A block or closure to indicate success or failure. If renaming succeeds, pass the ``FSFileName`` as it exists within `destinationDirectory` and a `nil` error. If renaming fails, pass the relevant error as the second parameter; FSKit ignores any ``FSFileName`` in this case. For an `async` Swift implementation, there's no reply handler; simply return the ``FSFileName`` or throw an error.
  message RenameItem {
    uint64 item_id = 1;
    uint64 source_directory_id = 2;
    bytes source_name = 3;
    bytes destination_name = 4;
    uint64 destination_directory_id = 5;
    optional uint64 over_item_id = 6;
  }

  // Enumerates the contents of the given directory.
  message EnumerateDirectory {
    uint64 directory_id = 1;
    uint64 cookie = 2;
    uint64 verifier = 3;
  }

  // Activates the volume using the specified options.
  //
  // When FSKit calls this method, allocate any in-memory state required to represent the file system.
  // Also allocate an ``FSItem`` for the root directory of the file system, and pass it to the reply block.
  // FSKit caches this root item for the lifetime of the volume, and uses it as a starting point for all file look-ups.
  //
  // Volume activation occurs prior to any call to mount the volume.
  //
  // - Parameters:
  //   - options: Options to apply to the activation. These can include security-scoped file paths.
  //              There are no defined options currently.
  //   - reply: A block or closure to indicate success or failure.
  //            If activation succeeds, pass the root ``FSItem`` and a `nil` error.
  //            If activation fails, pass the relevant error as the second parameter;
  //            FSKit ignores any ``FSItem`` in this case. In Swift, `reply` takes only the ``FSItem`` as the parameter;
  //            you signal any error with a `throw`. For an `async` Swift implementation, there's no reply handler;
  //            simply return the ``FSItem`` or throw an error.
  message Activate {
    TaskOptions options = 1;
  }

  // Tears down a previously initialized volume instance.
  //
  // Set up your implementation to release any resources allocated for the volume instance.
  // By the time you receive this callback, FSKit has already performed a reclaim call to release all other file nodes
  // associated with this file system instance.
  //
  // Avoid performing any I/O in this method.
  // Prior to calling this method, FSKit has already issued a sync call to perform any
  // cleanup-related I/O.
  //
  // FSKit unmounts any mounted volume with a call to ``unmount(replyHandler:)`` prior to the deactivate callback.
  //
  // - Parameters:
  //   - options: Options to apply to the deactivation.
  //   - reply: A block or closure to indicate success or failure.
  //            If activation fails, pass an error as the one parameter to the reply handler.
  //            If activation succeeds, pass `nil`. For an `async` Swift implementation, there's no reply handler;
  //            simply throw an error or return normally.
  message Deactivate {}

  // Properties implemented by volumes that natively or partially support extended attributes.
  message GetXattrOperations {}

  // Gets the specified extended attribute of the given item.
  message GetXattr {
    // The extended attribute name.
    bytes name = 1;

    // The item for which to get the extended attribute.
    uint64 item_id = 2;
  }

  // Sets the specified extended attribute data on the given item.
  message SetXattr {
    // The extended attribute name.
    bytes name = 1;

    // The extended attribute value to set. This can't be `nil`, unless the policy is ``SetXattrPolicy/delete``.
    optional bytes value = 2;

    // The item on which to set the extended attribute.
    uint64 item_id = 3;

    // The policy to apply when setting the attribute. See ``SetXattrPolicy`` for possible values.
    SetXattrPolicy policy = 4;
  }

  // Gets the list of extended attributes currently set on the given item.
  message GetXattrs {
    // The item from which to get extended attributes.
    uint64 item_id = 1;
  }

  // Opens a file for access.
  message OpenItem {
    uint64 item_id = 1;
    repeated OpenMode modes = 2;
  }

  // Closes a file from further access.
  message CloseItem {
    uint64 item_id = 1;
    repeated OpenMode modes = 2;
  }

  // Reads the contents of the given file item.
  message Read {
    uint64 item_id = 1;
    int64 offset = 2;
    int64 length = 3;
  }

  // Writes contents to the given file item.
  message Write {
    bytes contents = 1;
    uint64 item_id = 2;
    int64 offset = 3;
  }

  uint64 id = 1;
  oneof content {
    GetPathConfOperations get_path_conf_operations = 2;
    GetVolumeCapabilities get_volume_capabilities = 3;
    GetVolumeStatistics get_volume_statistics = 4;
    Mount mount = 5;
    Unmount unmount = 6;
    Synchronize synchronize = 7;
    GetAttributes get_attributes = 8;
    SetAttributes set_attributes = 9;
    LookupItem lookup_item = 10;
    ReclaimItem reclaim_item = 11;
    ReadSymbolicLink read_symbolic_link = 12;
    CreateItem create_item = 13;
    CreateSymbolicLink create_symbolic_link = 14;
    RemoveItem remove_item = 15;
    RenameItem rename_item = 16;
    EnumerateDirectory enumerate_directory = 17;
    Activate activate = 18;
    Deactivate deactivate = 19;
    GetXattrOperations get_xattr_operations = 20;
    GetXattr get_xattr = 21;
    SetXattr set_xattr = 22;
    GetXattrs get_xattrs = 23;
    OpenItem open_item = 24;
    CloseItem close_item = 25;
    Read read = 26;
    Write write = 27;
  }
}

/// A class that passes command options to a task, optionally providing security-scoped URLs.
message TaskOptions {
  /// An array of strings that represent command-line options for the task.
  ///
  /// This property is equivalent to the `argv` array of C strings passed to a command-line tool.
  repeated string task_options = 1;
}

message Response {
  uint64 request_id = 1;
  oneof content {
    PathConfOperations path_conf_operations = 2;
    VolumeCapabilities volume_capabilities = 3;
    StatFSResult stat_fs_result = 4;
    ItemAttributes item_attributes = 5;
    Item item = 6;
    DirectoryEntries directory_entries = 7;
    XattrOperations xattr_operations = 8;
    Xattrs xattrs = 9;
    bytes data = 10;
    int64 byte_count = 11;
    Success success = 12;
    int32 posix_error = 13;
  }
}

// Properties implemented by volumes that support providing the values of system limits or options.
//
// This protocol gathers properties related to the `pathconf` and `fpathconf` system calls.
//
// For a file, the value of a property applies to just that file; for a directory, the value applies to all items in the directory.
//
// Properties that represent limits and have a numeric type use `-1` to represent no limit.
message PathConfOperations {
  // A property that represents the maximum number of hard links to the object.
  int64 maximum_link_count = 1;

  // A property that represents the maximum length of a component of a filename.
  int64 maximum_name_length = 2;

  // A Boolean property that indicates whether the volume restricts ownership changes based on authorization.
  //
  // If this value is true, the volume rejects a `chown(2)` from anyone other than the superuser.
  bool restricts_ownership_changes = 3;

  // A property that indicates whether the volume truncates files longer than its maximum supported length.
  //
  // If this value is `true`, the volume truncates the filename to ``maximumNameLength`` if the filename is longer than that.
  // If this value is false, the file system responds with the error code `ENAMETOOLONG` if the filename is longer than ``maximumNameLength``.
  bool truncates_long_names = 4;

  // The maximum extended attribute size in bytes.
  //
  // Implement at least one of `maximumXattrSize` or ``maximumXattrSizeInBits``.
  // FSKit automatically converts from one to another if needed.
  // If you implement both, FSKit uses only the `maximumXattrSizeInBits` implementation.
  optional int64 maximum_xattr_size = 5;

  // The maximum extended attribute size in bits.
  //
  // Implement at least one of ``maximumXattrSize`` or `maximumXattrSizeInBits`.
  // FSKit automatically converts from one to another if needed.
  // If you implement both, FSKit uses only the `maximumXattrSizeInBits` implementation.
  optional int64 maximum_xattr_size_in_bits = 6;

  // The maximum size of a regular file allowed in the volume.
  //
  // Implement at least one of `maximumFileSize` or ``maximumFileSizeInBits``.
  // FSKit automatically converts from one to another if needed.
  // If you implement both, FSKit uses only the `maximumFileSizeInBits` implementation.
  optional uint64 maximum_file_size = 7;

  // The minimum number of bits needed to represent, as a signed integer value, the maximum size of a regular file allowed in the volume.
  //
  // The maximum file size is `2^(maximumFileSizeInBits - 1)`.
  //
  // | Maximum file size (bytes)  | Maximum (in hex)     | Unsigned bits | Signed bits |
  // | -------------------------: | -------------------: | ------------: | ----------: |
  // |                     65,535 |             `0xFFFF` |            16 |          17 |
  // |              2,147,483,647 |         `0x7FFFFFFF` |            31 |          32 |
  // |              4,294,967,295 |         `0xFFFFFFFF` |            32 |          33 |
  // | 18,446,744,073,709,551,615 | `0xFFFFFFFFFFFFFFFF` |            64 |          65 |
  //
  // Implement at least one of ``maximumFileSize`` or `maximumFileSizeInBits`.
  // FSKit automatically converts from one to another if needed.
  // If you implement both, FSKit uses only the `maximumFileSizeInBits` implementation.
  optional int64 maximum_file_size_in_bits = 8;
}

// A type that represents capabilities supported by a volume, such as hard and symbolic links, journaling,
// and large file sizes.
message VolumeCapabilities {
  // A Boolean property that indicates whether the volume supports persistent object identifiers and can
  // look up file system objects by their IDs.
  optional bool supports_persistent_object_ids = 1;

  // A Boolean property that indicates whether the volume supports symbolic links.
  optional bool supports_symbolic_links = 2;

  // A Boolean property that indicates whether the volume supports hard links.
  optional bool supports_hard_links = 3;

  // A Boolean property that indicates whether the volume supports a journal used to speed recovery
  // in case of unplanned restart, such as a power outage or crash.
  // This property doesn't necessarily mean the volume is actively using a journal.
  optional bool supports_journal = 4;

  // A Boolean property that indicates whether the volume currently uses a journal for speeding recovery
  // after an unplanned shutdown.
  optional bool supports_active_journal = 5;

  // A Boolean property that indicates the volume doesn't store reliable times for the root directory.
  // If this value is `true` (Swift) or `YES` (Objective-C), the volume doesn't store reliable times
  // for the root directory.
  optional bool does_not_support_root_times = 6;

  // A Boolean property that indicates whether the volume supports sparse files.
  // A sparse file is a file that can have "holes" that the file system has never written to,
  // and as a result don't consume space on disk.
  optional bool supports_sparse_files = 7;

  // A Boolean property that indicates whether the volume supports zero runs
  // If this value is true, the volume keeps track of allocated but unwritten runs of a file
  // so that it can substitute zeroes without actually writing zeroes to the media.
  optional bool supports_zero_runs = 8;

  // A Boolean property that indicates whether the volume supports fast results when fetching file system statistics.
  // A true value means this volume hints to upper layers to indicate that `statfs(2)` is fast enough
  // that its results need not be cached by the caller.
  optional bool supports_fast_statfs = 9;

  // A Boolean property that indicates whether the volume supports file sizes larger than 4GB,
  // and potentially up to 2TB.
  optional bool supports_2tb_files = 10;

  // A Boolean property that indicates whether the volume supports open deny modes.
  // These are modes such as "open for read write, deny write".
  optional bool supports_open_deny_modes = 11;

  // A Boolean property that indicates whether the volume supports hidden files.
  // A `true` value means the volume supports the `UF_HIDDEN` file flag.
  optional bool supports_hidden_files = 12;

  // A Boolean property that indicates the volume doesn't support certain volume size reports.
  // A true value means the volume doesn't support determining values for total data blocks, available blocks,
  // or free blocks, as in `f_blocks`, `f_bavail`, and `f_bfree` in the struct `statFS` returned by `statfs(2)`.
  optional bool does_not_support_volume_sizes = 13;

  // A Boolean property that indicates whether the volume supports 64-bit object IDs.
  optional bool supports_64bit_object_ids = 14;

  // A Boolean property that indicates whether the volume supports document IDs for document revisions.
  // A document ID is an identifier that persists across object ID changes.
  optional bool supports_document_id = 15;

  // A Boolean property that indicates the volume doesn't support immutable files.
  // A `true` value means this volume doesn't support setting the `UF_IMMUTABLE` flag.
  optional bool does_not_support_immutable_files = 16;

  // A Boolean property that indicates the volume doesn't set file permissions.
  // If this value is `true` (Swift) or `YES` (Objective-C), the volume doesn't support setting file permissions.
  optional bool does_not_support_setting_file_permissions = 17;

  // A Boolean property that indicates whether the volume supports multiple logical file systems
  // that share space in a single "partition."
  optional bool supports_shared_space = 18;

  // A Boolean property that indicates whether the volume supports volume groups.
  // Volume groups involve multiple logical file systems that the system can mount and unmount together,
  // and for which the system can present common file system identifier information.
  optional bool supports_volume_groups = 19;

  // A value that indicates the volume's support for case sensitivity.
  optional CaseFormat case_format = 20;
}

// A type used to report a volume's statistics.
//
// The names of this type's properties match those in the `statfs` structure in `statfs(2)`,
// which reports these values for an FSKit file system.
// All numeric properties default to `0`.
// Override these values, unless a given property has no meaningful value to provide.
//
// > Note: Available space, free space, total space, and used space have properties to express their values
// either as a number of blocks or a number of bytes.
// Your module may supply both of these values by setting both the relevant block or byte property.
// Alternatively, a module may set only one of the two properties.
// When you do this, FSKit calculates the matching value based on ``blockSize``.
//
// For the read-only ``fileSystemTypeName``, set this value with the designated initializer.
message StatFSResult {
  // A property for the volume's block size, in bytes.
  //
  // This value defaults to `4096`. Zero isn't a valid block size.
  int64 block_size = 1;

  // A property for the optimal block size with which to perform I/O.
  //
  // For best performance, specify an `ioSize` that's an even multiple of ``blockSize``.
  int64 io_size = 2;

  // A property for the volume's total data block count.
  uint64  total_blocks = 3;

  // A property for the number of free blocks available to a non-superuser on the volume.
  uint64 available_blocks = 4;

  // A property for the number of free blocks in the volume.
  uint64 free_blocks = 5;

  // A property for the number of used blocks in the volume.
  uint64 used_blocks = 6;

  // A property for the total size, in bytes, of the volume.
  uint64  total_bytes = 7;

  // A property for the amount of space available to users, in bytes, in the volume.
  uint64 available_bytes = 8;

  // A property for the amount of free space, in bytes, in the volume.
  uint64 free_bytes = 9;

  // A property for the amount of used space, in bytes, in the volume.
  uint64  used_bytes = 10;

  // A property for the total number of file slots in the volume,
  uint64 total_files = 11;

  // A property for the total number of free file slots in the volume.
  uint64 free_files = 12;

  // A property for the file system's subtype or flavor.
  //
  // Match this value to the `FSPersonalities`'s `FSSubType` attribute, if it exists within
  // the `EXAppExtensionAttributes` dictionary of the module's `Info.plist`.
  int64  file_system_sub_type = 13;

  // A property for the file system type name.
  //
  // Match this value to the `FSShortName` attribute within the `EXAppExtensionAttributes`
  // dictionary of the module's `Info.plist`.
  // The maximum allowed length is `MFSTYPENAMELEN`, including the terminating `NUL` character.
  string  file_system_type_name = 14;
}

// Attributes of an item, such as size, creation and modification times, and user and group identifiers.
message ItemAttributes {
  // The user identifier.
  optional uint32 uid = 1;

  // The group identifier.
  optional uint32 gid = 2;

  // The mode of the item.
  // The mode is often used for `setuid`, `setgid`, and `sticky` bits.
  optional uint32 mode = 3;

  // The item type, such as a regular file, directory, or symbolic link.
  optional ItemType type = 4;

  // The number of hard links to the item.
  optional uint32 link_count = 5;

  // The item's behavior flags.
  // See `st_flags` in `stat.h` for flag definitions.
  optional uint32 flags = 6;

  // The item's size.
  optional uint64 size = 7;

  // The item's allocated size.
  optional uint64 alloc_size = 8;

  // The item's file identifier.
  // Reserved values: invalid = 0, parentOfRoot = 1, and rootDirectory = 2.
  optional uint64 file_id = 9;

  // The identifier of the item's parent.
  // Reserved values: invalid = 0, parentOfRoot = 1, and rootDirectory = 2.
  optional uint64 parent_id = 10;

  // A Boolean value that indicates whether the item supports a limited set of extended attributes.
  optional bool supports_limited_xattrs = 11;

  // A Boolean value that indicates whether the file system overrides the per-volume settings
  // for kernel offloaded I/O for a specific file.
  // This property has no meaning if the volume doesn't conform to ``FSVolumeKernelOffloadedIOOperations``.
  optional bool inhibit_kernel_offloaded_io = 12;

  // The item's last-modified time.
  // This property represents `mtime`, the last time the item's contents changed.
  optional google.protobuf.Timestamp modify_time = 13;

  // The item's added time.
  // This property represents the time the file system added the item to its parent directory.
  optional google.protobuf.Timestamp added_time = 14;

  // The item's last-changed time.
  // This property represents `ctime`, the last time the item's metadata changed.
  optional google.protobuf.Timestamp change_time = 15;

  // The item's last-accessed time.
  optional google.protobuf.Timestamp access_time = 16;

  // The item's creation time.
  optional google.protobuf.Timestamp birth_time = 17;

  // The item's last-backup time.
  optional google.protobuf.Timestamp backup_time = 18;
}

// A distinct object in a file hierarchy, such as a file, directory, symlink, socket, and more.
message Item {
  // Attributes of an item, such as size, creation and modification times, and user and group identifiers.
  ItemAttributes attributes = 1;

  // The name of a file, expressed as a data buffer.
  bytes name = 2;
}

// An object used to provide items during a directory enumeration.
message DirectoryEntries {
  // An object used to provide item during a directory enumeration.
  message Entry {
    // A distinct object in a file hierarchy, such as a file, directory, symlink, socket, and more.
    Item item = 1;

    // A value to indicate the next entry in the directory to enumerate.
    uint64 next_cookie = 2;
  }

  // List of entries.
  repeated Entry entries = 1;

  // A tool to detect whether the directory contents changed since the last call to `enumerateDirectory`.
  uint64 verifier = 2;
}

// Properties implemented by volumes that natively or partially support extended attributes.
message XattrOperations {
  // A Boolean value that instructs FSKit not to call this protocol's methods, even if the volume conforms to it.
  //
  // FSKit reads this value after the file system replies to the `loadResource` message.
  // Changing the returned value during the runtime of the volume has no effect.
  optional bool xattr_operations_inhibited = 1;
}

// List of extended attributes.
message Xattrs {
  // The extended attribute name.
  repeated bytes names = 1;
}

// Successful result.
message Success {}

// An enumeration of case-sensitivity support types.
enum CaseFormat {
  // The volume is case sensitive.
  SENSITIVE = 0;

  // The volume isn't case sensitive.
  INSENSITIVE = 1;

  // The volume isn't case sensitive, but supports preserving the case of file and directory names.
  INSENSITIVE_CASE_PRESERVING = 2;
}

// An enumeration of item types, such as file, directory, or symbolic link.
enum ItemType {
  UNKNOWN = 0;
  FILE = 1;
  DIRECTORY = 2;
  SYMLINK = 3;
  FIFO = 4;
  CHAR_DEVICE = 5;
  BLOCK_DEVICE = 6;
  SOCKET = 7;
}

// Flags to specify the policy when setting extended file attributes.
enum SetXattrPolicy {
  // Set the value, regardless of previous state.
  ALWAYS_SET = 0;

  // Set the value, but fail if the extended attribute already exists.
  MUST_CREATE = 1;

  // Set the value, but fail if the extended attribute doesn't already exist.
  MUST_REPLACE = 2;

  // Delete the value, failing if the extended attribute doesn't exist.
  DELETE = 3;
}

// An enumeration of open modes, such as read or write.
enum OpenMode {
  NONE = 0;
  READ = 1;
  WRITE = 2;
}
